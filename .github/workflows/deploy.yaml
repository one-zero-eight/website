name: Build and deploy

on:
  # Allow manual trigger of the workflow
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy to
        type: environment
        required: true
  # Verify build on any push (but only deploy on main)
  push:
  # Verify build in pull requests
  pull_request:

jobs:
  build:
    name: Build static files
    runs-on: ubuntu-latest
    permissions: # Permissions granted to the 'GITHUB_TOKEN'
      contents: read
      packages: write
      pull-requests: write
      security-events: write

    environment: ${{ github.event.inputs.environment || 'pre' }}
    steps:
      - name: 👾 Checkout repository
        uses: actions/checkout@v6

      - name: 📦 Configure environment variables
        run: echo "${{ vars.ENV_VARIABLES }}" > .env.local

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v5

      - name: 📦 Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: ⚡️ Build
        run: pnpm run build

      - name: ⚡️ List files
        run: |
          # Save the list of files as a GitHub Actions step summary
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          ls -lAhR ./dist 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: ⚡️ Upload files as artifact
        uses: actions/upload-artifact@v7
        with:
          name: static-files
          path: dist/
          if-no-files-found: error

  deploy:
    if: github.repository_owner == 'one-zero-eight' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main'))
    name: ⚡️ Deploy to server for ${{ github.event.inputs.environment || 'pre' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'pre' }}
      url: ${{ vars.DEPLOY_URL }}
    concurrency:
      group: ${{ github.event.inputs.environment || 'pre' }}
      cancel-in-progress: false
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: static-files
          path: dist

      - name: Deploy via deployer API
        env:
          DEPLOYER_URL: ${{ secrets.DEPLOYER_PRODUCTION_URL }}
          WEBHOOK_SECRET: ${{ secrets.DEPLOYER_PRODUCTION_WEBHOOK_SECRET }}
          DEPLOYER_PROXY: ${{ secrets.DEPLOYER_PROXY }}
          REPOSITORY: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          ENVIRONMENT: ${{ github.event.inputs.environment || 'pre' }}
        run: |
          set -euo pipefail

          deploy_log="$(mktemp)"
          archive="$(mktemp --suffix=.tar.xz)"
          trap 'rm -f "$deploy_log" "$archive"' EXIT

          tar -cJf "$archive" -C dist .

          curl_args=(
            -fNSs
            --no-progress-meter
            --connect-timeout 10
            -H "Authorization: Bearer ${WEBHOOK_SECRET}"
            -X POST
            -F "ref=${REF}"
            -F "archive=@${archive}"
          )

          if [[ -n "${DEPLOYER_PROXY:-}" ]]; then
            curl_args+=(--proxy "${DEPLOYER_PROXY}")
          fi

          curl "${curl_args[@]}" \
            "${DEPLOYER_URL}/deploy-static?repository=${REPOSITORY}&environment=${ENVIRONMENT}" \
            | tee "$deploy_log"

          if ! grep -q 'Static deploy completed successfully' "$deploy_log"; then
            echo "Deployment did not complete successfully" >&2
            exit 1
          fi
