components:
  schemas:
    BookingDTO:
      properties:
        room_id:
          type: string
          title: Room Id
          description: ID of the room
        event_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Event Id
          description: ID of the event
        title:
          type: string
          title: Title
          description: Title of the booking
        start_time:
          type: string
          format: date-time
          title: Start Time
          description: Start time of booking
        end_time:
          type: string
          format: date-time
          title: End Time
          description: End time of booking
        categories:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Categories
          description: Outlook categories on the calendar item
        recurrence:
          anyOf:
          - type: string
          - type: 'null'
          title: Recurrence
          description: EWS recurrence XML for recurring masters
        outlook_booking_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Outlook Booking Id
          description: ID of outlook booking in service account calendar. Only set
            if we can manage the booking.
      type: object
      required:
      - room_id
      - event_id
      - title
      - start_time
      - end_time
      - categories
      - recurrence
      - outlook_booking_id
      title: BookingDTO
      description: Booking description
    CapacityIssue:
      properties:
        issue_type:
          type: string
          const: capacity
          title: Issue Type
        text:
          type: string
          title: Text
          default: ''
        room:
          type: string
          title: Room
        room_capacity:
          anyOf:
          - type: integer
          - type: 'null'
