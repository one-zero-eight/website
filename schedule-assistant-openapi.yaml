    Item:
      properties:
        location:
          anyOf:
          - type: string
          - type: 'null'
          title: Location
          description: Room number, "ONLINE", "ОНЛАЙН", "?", or slash-separated combinations
            like "106/313"
        starts_from:
          anyOf:
          - type: string
            format: date
          - type: 'null'
          title: Starts From
          description: Date when the event starts (overrides event.starts)
        ends_on:
          anyOf:
          - type: string
            format: date
          - type: 'null'
          title: Ends On
          description: Date when the event ends (overrides event.ends)
        starts_at:
          anyOf:
          - type: string
            format: time
          - type: 'null'
          title: Starts At
          description: Time when the event starts (overrides event.start_time, preserves
            duration)
        till:
          anyOf:
          - type: string
            format: time
          - type: 'null'
          title: Till
          description: Time when the event ends (overrides event.end_time)
        on_weeks:
          anyOf:
          - items:
              type: integer
            type: array
          - type: 'null'
          title: On Weeks
          description: List of week numbers (1-based, converted to dates during ICS
            generation)
        'on':
          anyOf:
          - items:
              type: string
              format: date
            type: array
          - type: 'null'
          title: 'On'
          description: List of specific dates when event occurs (creates RDATE instead
            of RRULE)
        except_:
          anyOf:
          - items:
              type: string
              format: date
            type: array
          - type: 'null'
          title: Except
          description: List of dates to exclude from recurrence (creates EXDATE)
        NEST:
          anyOf:
          - items:
              $ref: '#/components/schemas/Item'
            type: array
          - type: 'null'
          title: Nest
          description: List of nested Item objects for complex location patterns
      type: object
      title: Item
      description: "Represents a parsed location string with optional modifiers and\
        \ nested locations.\n\nThis class is the result of parsing location strings\
        \ from spreadsheet cells (third row\nin CoreCourseCell). The location string\
        \ can contain room numbers, online indicators,\nand various temporal modifiers\
        \ that affect when and where events occur.\n\n## Flow Overview\n\n### 1. Input:\
        \ Spreadsheet Location String\nLocation strings come from the third cell value\
        \ in CoreCourseCell (value[2]).\nExamples:\n- \"313\" → simple room number\n\
        - \"ONLINE\" → online event\n- \"313 (WEEK 1-3) / ONLINE\" → room 313 for\
        \ weeks 1-3, then online\n- \"ONLINE ON 13/09, 108 ON 01/11 (STARTS AT 9:00)\"\
        \ → online on 13/09, room 108 on 01/11, both starting at 9:00\n- \"460 EXCEPT\
        \ 28/11\" → room 460, excluding 28/11\n\n### 2. Parsing: parse_location_string()\n\
        The location string is normalized (uppercased, \"AND\" replaced with commas)\
        \ and parsed\ninto an Item object. The parser recognizes:\n\n**Locations:**\n\
        - Room numbers: \"313\", \"room 107\", \"ROOM #107\" → location=\"313\" or\
        \ \"107\"\n- Online: \"ONLINE\", \"ОНЛАЙН\", \"ONLINE (TBA)\" → location=\"\
        ONLINE\" or \"ОНЛАЙН\"\n- Unknown: \"?\" → location=\"?\"\n- Multiple: \"\
        106/313/314\" → location=\"106/313/314\"\n\n**Modifiers:**\n- `starts_from`:\
        \ \"STARTS FROM 21/09\" → starts_from=date(2024, 9, 21)\n- `ends_on`: \"ENDS\
        \ ON 12/03\" or \"ДО 12/03\" or \"КОНЕЦ 12/03\" → ends_on=date(2024, 3, 12)\n\
        - `starts_at`: \"STARTS AT 18:00\" → starts_at=time(18, 0)\n- `till`: \"TILL\
        \ 21:00\" → till=time(21, 0)\n- `on_weeks`: \"WEEK 1-3\" → on_weeks=[1, 2,\
        \ 3]\n- `on`: \"ON 13/09, 20/09\" → on=[date(2024, 9, 13), date(2024, 9, 20)]\n\
        - `except_`: \"EXCEPT 30/01, 06/02\" → except_=[date(2024, 1, 30), date(2024,\
        \ 2, 6)]\n\n**Nested Structures (NEST):**\nComplex patterns create nested\
        \ Items:\n- \"313 (WEEK 1-3) / ONLINE\" → Item(location=\"313\", on_weeks=[1,2,3],\
        \ NEST=[Item(location=\"ONLINE\")])\n- \"105 ON 15/10, 106 ON 29/10\" → Item(location=\"\
        105\", on=[...], NEST=[Item(location=\"106\", on=[...])])\n- \"ONLINE ON 13/09,\
        \ 108 ON 01/11 (STARTS AT 9:00)\" → Item with nested items sharing starts_at\n\
        \n### 3. Output: ICS Calendar Events (generate_vevents())\nThe Item is converted\
        \ to one or more ICS calendar events:\n\n**Simple Case (no location_item):**\n\
        - Creates one recurring event with RRULE (weekly recurrence)\n- Uses event.location,\
        \ event.start_time, event.end_time\n\n**With location_item:**\n\n**Base Event\
        \ Properties:**\n- `location`: Uses location_item.location or falls back to\
        \ event.location\n- `starts`: Uses location_item.starts_from or falls back\
        \ to event.starts\n- `ends`: Uses location_item.ends_on or falls back to event.ends\n\
        - `start_time`: Adjusted if location_item.starts_at exists (keeps duration)\n\
        - `end_time`: Set to location_item.till if exists, otherwise calculated from\
        \ start_time + duration\n\n**Recurrence Handling:**\n- `on_weeks` → Converted\
        \ to specific dates using nearest_weekday() + weeks offset, merged into `on`\n\
        - If `on` exists: Creates events with RDATE (specific dates) instead of RRULE\n\
        \  - Each date in `on` becomes a recurrence date\n  - dtstart/dtend adapted\
        \ to first date in `on`\n- If `on` is None: Creates weekly recurring event\
        \ with RRULE\n- If `except_` exists: Adds EXDATE to exclude specific dates\
        \ from recurrence\n\n**Nested Items (NEST):**\nNested items create additional\
        \ calendar events:\n\n- If parent has RRULE (weekly recurrence):\n  - For\
        \ each nested item with `on` dates:\n    - Creates RECURRENCE-ID events overriding\
        \ specific recurrence instances\n    - Uses nested item's location, starts_at,\
        \ till if specified\n    - Removes RRULE from override event\n    - Parent\
        \ event still yields with RRULE\n\n- If parent has RDATE (specific dates):\n\
        \  - Creates separate events for nested items\n  - Each nested item gets its\
        \ own RDATE with its `on` dates\n  - Uses nested item's location, starts_at,\
        \ till if specified\n  - Parent event yields first, then nested events\n\n\
        **Examples of ICS Output:**\n\nInput: \"313\"\n→ One event: location=\"313\"\
        , RRULE=FREQ=WEEKLY\n\nInput: \"ONLINE ON 13/09, 20/09\"\n→ One event: location=\"\
        ONLINE\", RDATE=[2024-09-13, 2024-09-20]\n\nInput: \"313 (WEEK 1-3) / ONLINE\"\
        \n→ Two events:\n  1. location=\"313\", RRULE=FREQ=WEEKLY (with EXDATE for\
        \ weeks after 3)\n  2. location=\"ONLINE\", RDATE=[dates for weeks 4+]\n\n\
        Input: \"ONLINE ON 13/09, 108 ON 01/11 (STARTS AT 9:00)\"\n→ Three events:\n\
        \  1. location=\"ONLINE\", RDATE=[2024-09-13], dtstart=09:00\n  2. location=\"\
        108\", RDATE=[2024-11-01], dtstart=09:00\n  3. Parent recurring event (if\
        \ applicable)\n\nInput: \"460 EXCEPT 28/11\"\n→ One event: location=\"460\"\
        , RRULE=FREQ=WEEKLY, EXDATE=[2024-11-28]"
