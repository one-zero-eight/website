openapi: 3.1.0
info:
  title: InNoHassle Schedule Builder API
  summary: Build and manage academic schedules at Innopolis University.
  description: '

    ### About this project


    This is the API for Schedule Builder project in InNoHassle ecosystem developed
    by [one-zero-eight](https://t.me/one_zero_eight) community.


    Using this API you can build academic schedules and manage room bookings at Innopolis
    University.


    Backend is developed using FastAPI framework on Python.


    Note: API is unstable. Endpoints and models may change in the future.


    Useful links:

    - [Schedule Builder API source code](https://github.com/one-zero-eight/schedule-builder-backend)

    - [Schedule Builder frontend source code](https://github.com/one-zero-eight/schedule-builder-frontend)

    - [InNoHassle Website](https://innohassle.ru)

    '
  contact:
    name: one-zero-eight (Telegram)
    url: https://t.me/one_zero_eight
  license:
    name: MIT License
    identifier: MIT
  version: 0.1.0
servers:
- url: ''
  description: Current
- url: https://api.innohassle.ru/schedule-builder/v0
  description: Production environment
- url: https://api.innohassle.ru/schedule-builder/staging-v0
  description: Staging environment
